<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Visual Representation</title>
<link rel="stylesheet" href="property.css">
</head>
<body>
<h1>🚀 CSS Visual Representation 🚀</h1>

<div class="container">

    <div class="card pseudo">
        <h2>Pseudo Elements</h2>
        <p>Before & After</p>
    </div>

    <div class="card hover-card">
        <h2>Hover & Active</h2>
        <p>Move mouse here</p>
    </div>

    <div class="card focus-card">
        <h2>Focus</h2>
        <input type="text" placeholder="Click me">
    </div>

    <div class="card transform-card">
        <h2>Transform</h2>
        <p>Hover Me</p>
    </div>

    <div class="card transform3d-card">
        <h2>3D Transform</h2>
        <p>Hover Me</p>
    </div>

    <div class="card animation-card">
        <h2>Animation</h2>
        <div class="ball"></div>
    </div>

</div>

</body>
</html>
